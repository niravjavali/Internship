<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: grey;
            display: flex;
            gap: 10px;
        }
        h1{
            background-color: black;
            color: white;
            flex-grow: 1;
        }
        h2{
            background-color: black;
            color: white;
            flex-grow: 2;
        }
        h3{
            background-color: black;
            color: white;
            flex-grow: 3; /* this property splits the screen*/
        }
    </style>
</head>
<body>
    <div>
    <h1>One</h1>
    <h2>Two</h2>
    <h3>Three</h3>
    </div>
</body>
</html>
