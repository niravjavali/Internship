<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black
        }
        .parent{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 150px);
            gap: 10px;
        }
        .Child{
            background-color: grey;
            color: #F5F5DC;
            font-size: 40px;
            display: grid;
            align-items: center;
            justify-content: center;
        }
        #box1{
            /* grid-column-start: 1;
            grid-column-end: 3; */
            grid-column: span 3; 
        }
        #box2{
            grid-row: span 2; 
        }
        #box7{
            grid-column: span 3;
            height: 150px;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="Child" id="box1">1</div>
        <div class="Child" id="box2">2</div>
        <div class="Child" id="box3">3</div>
        <div class="Child" id="box4">4</div>
        <div class="Child" id="box5">5</div>
        <div class="Child" id="box6">6</div>
        <div class="Child" id="box7">7</div>
    </div>
</body>
</html>
