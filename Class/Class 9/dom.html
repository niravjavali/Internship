<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .active
        {
            color: black;
        }
        .hidden
        {
            display: none;
        }
        .dark
        {
            background-color: black;
            color: grey;
            padding: 10px;
        }
        .new
        {
            color: beige;
        }
    </style>
</head>
<body>
    <h1 class="heading">Javascript DOM</h1>

    <script>
    let ruas = document.querySelector("h1")
    // add a class
    ruas.classList.add("dark")
    console.log(ruas.className);
    // remove a class
    ruas.classList.remove("dark")
    console.log(ruas.className);
    //toggle a class
    </script>

</body>
</html>
