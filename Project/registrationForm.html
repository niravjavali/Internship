<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form action="">

    <h3>Student Registration Form</h3>

    <label for="fullname">Enter your Full Name:</label>
    <br>
    <input type="text" id="fullname" name="fullname" placeholder="Enter your Full Name">

    <br><br>

    <label for="emailid">Enter your Email ID:</label>
    <br>
    <input type="email" id="emailid" name="emailid" placeholder="Enter your Email ID">

    <br><br>

    <label for="password">Enter your Password:</label>
    <br>
    <input type="password" id="password" name="password" placeholder="Enter your Password">

    <br><br>

    <label>Gender:</label>
    <br>

    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>

    <br><br>

    <label>Skills:</label>
    <br>

    <input type="checkbox" id="html" name="skills" value="HTML">
    <label for="html">HTML</label>

    <br>

    <input type="checkbox" id="css" name="skills" value="CSS">
    <label for="css">CSS</label>

    <br>

    <input type="checkbox" id="javascript" name="skills" value="JavaScript">
    <label for="javascript">JavaScript</label>

    <br><br>

    <label for="country">Country:</label>
    <br>

    <select id="country" name="country">
        <option value="India">India</option>
        <option value="Germany">Germany</option>
        <option value="USA">USA</option>
        <option value="Canada">Canada</option>
        <option value="Mexico">Mexico</option>
        <option value="England">England</option>
    </select>

    <br><br>

    <label for="department">Department:</label>
    <br>

    <select id="department" name="department">
        <option value="aiml">AIML</option>
        <option value="cse">CSE</option>
        <option value="ece">ECE</option>
        <option value="ise">ISE</option>
    </select>

    <br><br>

    <label for="date">Enter your DOB:</label>
    <br>
    <input type="date" id="date" name="dob">

    <br><br>

    <label for="file">Upload your Resume:</label>
    <br>
    <input type="file" id="file" name="resume">

    <br><br>

    <label for="address">Enter your Address:</label>
    <br>

    <textarea id="address" name="address" rows="5" cols="30" placeholder="Enter your Address"></textarea>

    <br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

    </form>
</body>
</html>
